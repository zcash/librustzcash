[package]
name = "zcash_pool_migration"
description = "Orchard to Ironwood value-pool migration engine for Zcash wallets"
version = "0.1.0"
authors = ["Michal Fousek <michal.fousek@chlup.info>"]
homepage = "https://github.com/zcash/librustzcash"
repository.workspace = true
readme = "README.md"
license.workspace = true
edition.workspace = true
rust-version.workspace = true
categories.workspace = true

[package.metadata.docs.rs]
all-features = true

[dependencies]
# The `serde` feature is required transitively: the high-level `create_pczt_from_proposal`
# (the mandated transfer-construction path, spec D4) has a `DbT::AccountId: serde::Serialize`
# bound, and `AccountUuid` only implements `Serialize` under `zcash_client_sqlite/serde`. This
# enables serialization of an upstream id type; this crate itself derives no serde and hand-rolls
# its own storage encodings (spec D3).
zcash_client_sqlite = { workspace = true, features = ["orchard", "serde", "transparent-inputs"] }
zcash_protocol.workspace = true

pczt = { workspace = true, features = ["orchard", "io-finalizer", "prover", "signer", "spend-finalizer", "tx-extractor", "zcp-builder"] }
rand.workspace = true
rand_distr.workspace = true
rusqlite.workspace = true
shardtree.workspace = true

[dev-dependencies]
# Deterministic seeding for the scheduling tests: transfer cadence is sampled from an exponential
# distribution (see `scheduling::sample_cadence_blocks`), so tests need a reproducible RNG rather
# than `OsRng`.
rand_chacha.workspace = true
# The store tests open a real SQLite database at a throwaway path.
tempfile = "3"

[features]
expensive-tests = []

[lints]
workspace = true
